name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "22"

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      transcription: ${{ steps.changes.outputs.transcription }}
      orchestration: ${{ steps.changes.outputs.orchestration }}
      shared: ${{ steps.changes.outputs.shared }}
      dashboard: ${{ steps.changes.outputs.dashboard }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            transcription:
              - 'modules/transcription-service/**'
            orchestration:
              - 'modules/orchestration-service/**'
            shared:
              - 'modules/shared/**'
            dashboard:
              - 'modules/dashboard-service/**'

  lint-python:
    needs: detect-changes
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: transcription-service
            path: modules/transcription-service
            changed: ${{ needs.detect-changes.outputs.transcription }}
          - name: orchestration-service
            path: modules/orchestration-service
            changed: ${{ needs.detect-changes.outputs.orchestration }}
    steps:
      - uses: actions/checkout@v6
        if: matrix.service.changed == 'true' || needs.detect-changes.outputs.shared == 'true' || github.event_name == 'push'

      - name: Install uv
        if: matrix.service.changed == 'true' || needs.detect-changes.outputs.shared == 'true' || github.event_name == 'push'
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Set up Python
        if: matrix.service.changed == 'true' || needs.detect-changes.outputs.shared == 'true' || github.event_name == 'push'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        if: matrix.service.changed == 'true' || needs.detect-changes.outputs.shared == 'true' || github.event_name == 'push'
        run: uv sync --all-packages --group dev

      - name: Run ruff linting
        if: matrix.service.changed == 'true' || needs.detect-changes.outputs.shared == 'true' || github.event_name == 'push'
        run: |
          uv run ruff check ${{ matrix.service.path }}/src/ ${{ matrix.service.path }}/tests/ --output-format=github || true

      - name: Run ruff format check
        if: matrix.service.changed == 'true' || needs.detect-changes.outputs.shared == 'true' || github.event_name == 'push'
        run: |
          uv run ruff format --check ${{ matrix.service.path }}/src/ ${{ matrix.service.path }}/tests/ || true

  type-check-python:
    needs: detect-changes
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: transcription-service
            path: modules/transcription-service
            changed: ${{ needs.detect-changes.outputs.transcription }}
          - name: orchestration-service
            path: modules/orchestration-service
            changed: ${{ needs.detect-changes.outputs.orchestration }}
    steps:
      - uses: actions/checkout@v6
        if: matrix.service.changed == 'true' || needs.detect-changes.outputs.shared == 'true' || github.event_name == 'push'

      - name: Install uv
        if: matrix.service.changed == 'true' || needs.detect-changes.outputs.shared == 'true' || github.event_name == 'push'
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Set up Python
        if: matrix.service.changed == 'true' || needs.detect-changes.outputs.shared == 'true' || github.event_name == 'push'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        if: matrix.service.changed == 'true' || needs.detect-changes.outputs.shared == 'true' || github.event_name == 'push'
        run: uv sync --all-packages --group dev

      - name: Run mypy type checking
        if: matrix.service.changed == 'true' || needs.detect-changes.outputs.shared == 'true' || github.event_name == 'push'
        run: |
          uv run mypy ${{ matrix.service.path }}/src/ --ignore-missing-imports --no-error-summary || true

  test-python:
    needs: detect-changes
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: transcription-service
            path: modules/transcription-service
            changed: ${{ needs.detect-changes.outputs.transcription }}
          - name: orchestration-service
            path: modules/orchestration-service
            changed: ${{ needs.detect-changes.outputs.orchestration }}
          - name: shared
            path: modules/shared
            changed: ${{ needs.detect-changes.outputs.shared }}
    steps:
      - uses: actions/checkout@v6
        if: matrix.service.changed == 'true' || github.event_name == 'push'

      - name: Install uv
        if: matrix.service.changed == 'true' || github.event_name == 'push'
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Set up Python
        if: matrix.service.changed == 'true' || github.event_name == 'push'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install system dependencies
        if: matrix.service.changed == 'true' || github.event_name == 'push'
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libsndfile1 portaudio19-dev

      - name: Install dependencies
        if: matrix.service.changed == 'true' || github.event_name == 'push'
        run: uv sync --all-packages --group dev

      - name: Run pytest
        if: matrix.service.changed == 'true' || github.event_name == 'push'
        run: |
          uv run pytest ${{ matrix.service.path }}/tests/ \
            -v \
            --tb=short \
            -m "not slow and not gpu and not integration and not e2e" \
            || true

  check-dashboard:
    needs: detect-changes
    if: needs.detect-changes.outputs.dashboard == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: modules/dashboard-service
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: modules/dashboard-service/package-lock.json

      - name: Create .env for SvelteKit static env resolution
        run: |
          cat > .env << 'ENVEOF'
          ORCHESTRATION_URL=http://localhost:3000
          PUBLIC_WS_URL=ws://localhost:3000
          PUBLIC_APP_NAME=LiveTranslate
          ENVEOF

      - name: Install dependencies
        run: npm ci

      - name: Svelte check (type + lint)
        run: npx svelte-check --threshold error

      - name: Build
        run: npm run build

  ci-status:
    needs:
      - lint-python
      - type-check-python
      - test-python
      - check-dashboard
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check CI Status
        run: |
          if [[ "${{ needs.lint-python.result }}" == "failure" ]] || \
             [[ "${{ needs.type-check-python.result }}" == "failure" ]] || \
             [[ "${{ needs.test-python.result }}" == "failure" ]] || \
             [[ "${{ needs.check-dashboard.result }}" == "failure" ]]; then
            echo "CI failed"
            exit 1
          fi
          echo "CI passed successfully"
