version: 2
updates:
  # Transcription Service - Python dependencies
  - package-ecosystem: pip
    directory: /modules/transcription-service
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: America/New_York
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - python
      - transcription-service
    commit-message:
      prefix: "deps(transcription)"
    groups:
      python-minor:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
    ignore:
      - dependency-name: torch
        update-types:
          - version-update:semver-major
      - dependency-name: torchaudio
        update-types:
          - version-update:semver-major

  # Orchestration Service - Python dependencies
  - package-ecosystem: pip
    directory: /modules/orchestration-service
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: America/New_York
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - python
      - orchestration-service
    commit-message:
      prefix: "deps(orchestration)"
    groups:
      python-minor:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
    ignore:
      - dependency-name: openvino*
        update-types:
          - version-update:semver-major

  # Dashboard Service - npm dependencies
  - package-ecosystem: npm
    directory: /modules/dashboard-service
    schedule:
      interval: weekly
      day: tuesday
      time: "06:00"
      timezone: America/New_York
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - javascript
      - dashboard-service
    commit-message:
      prefix: "deps(dashboard)"
    groups:
      svelte:
        patterns:
          - svelte
          - "@sveltejs/*"
          - svelte-check
        update-types:
          - minor
          - patch
      ui:
        patterns:
          - bits-ui
          - "@lucide/*"
          - tailwindcss
          - "@tailwindcss/*"
        update-types:
          - minor
          - patch
      dev-dependencies:
        patterns:
          - typescript
          - vite
          - "@vitejs/*"
        update-types:
          - minor
          - patch

  # Docker dependencies
  - package-ecosystem: docker
    directory: /modules/transcription-service
    schedule:
      interval: weekly
      day: wednesday
      time: "06:00"
      timezone: America/New_York
    open-pull-requests-limit: 2
    labels:
      - dependencies
      - docker
    commit-message:
      prefix: "deps(docker-transcription)"

  - package-ecosystem: docker
    directory: /modules/orchestration-service
    schedule:
      interval: weekly
      day: wednesday
      time: "06:00"
      timezone: America/New_York
    open-pull-requests-limit: 2
    labels:
      - dependencies
      - docker
    commit-message:
      prefix: "deps(docker-orchestration)"

  # GitHub Actions dependencies
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: thursday
      time: "06:00"
      timezone: America/New_York
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: "deps(actions)"
    groups:
      actions-minor:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
