<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgK" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <filter id="shadowK">
      <feDropShadow dx="0" dy="4" stdDeviation="2" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>
  <!-- Soft squircle background -->
  <rect x="32" y="32" width="448" height="448" rx="100" fill="url(#bgK)"/>

  <!-- Cute speech bubble character with translation powers -->
  <!-- Main body - rounded speech bubble shape -->
  <ellipse cx="256" cy="240" rx="140" ry="120" fill="#fff" filter="url(#shadowK)"/>
  <!-- Tail -->
  <path d="M180 320 Q160 380 200 360 Q200 340 180 320" fill="#fff"/>

  <!-- Happy eyes -->
  <ellipse cx="210" cy="220" rx="20" ry="24" fill="#1e1b4b"/>
  <ellipse cx="302" cy="220" rx="20" ry="24" fill="#1e1b4b"/>
  <!-- Eye sparkles -->
  <circle cx="218" cy="212" r="8" fill="#fff"/>
  <circle cx="310" cy="212" r="8" fill="#fff"/>

  <!-- Cute smile -->
  <path d="M220 270 Q256 300 292 270" stroke="#1e1b4b" stroke-width="8" stroke-linecap="round" fill="none"/>

  <!-- Small floating translation symbols around -->
  <text x="360" y="160" font-family="system-ui" font-size="32" fill="#fff" opacity="0.9">あ</text>
  <text x="120" y="180" font-family="system-ui" font-size="28" fill="#fff" opacity="0.8">文</text>
  <text x="380" y="340" font-family="system-ui" font-size="24" fill="#fff" opacity="0.7">ع</text>

  <!-- Sound waves emanating -->
  <path d="M400 220 Q420 240 400 260" stroke="#fff" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.6"/>
  <path d="M420 200 Q450 240 420 280" stroke="#fff" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.4"/>
</svg>
