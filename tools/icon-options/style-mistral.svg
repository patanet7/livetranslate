<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgM" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#0d0d0d"/>
    </linearGradient>
    <linearGradient id="flowM" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FA520F"/>
      <stop offset="100%" stop-color="#FF8A50"/>
    </linearGradient>
  </defs>
  <!-- Dark squircle background -->
  <rect x="32" y="32" width="448" height="448" rx="100" fill="url(#bgM)"/>

  <!-- Abstract flowing transformation - audio wave becoming different forms -->
  <!-- Input wave (left) -->
  <path d="M100 256 Q140 180 140 256 Q140 332 180 256"
        stroke="url(#flowM)" stroke-width="24" stroke-linecap="round" fill="none"/>

  <!-- Transformation flow (center) - swirling wind -->
  <path d="M200 256 Q256 160 312 256 Q256 352 200 256"
        stroke="url(#flowM)" stroke-width="20" stroke-linecap="round" fill="none" opacity="0.8"/>

  <!-- Output forms (right) - branching into multiple -->
  <path d="M340 200 Q380 200 400 160"
        stroke="url(#flowM)" stroke-width="16" stroke-linecap="round" fill="none"/>
  <path d="M340 256 Q380 256 412 256"
        stroke="url(#flowM)" stroke-width="16" stroke-linecap="round" fill="none" opacity="0.9"/>
  <path d="M340 312 Q380 312 400 352"
        stroke="url(#flowM)" stroke-width="16" stroke-linecap="round" fill="none" opacity="0.7"/>
</svg>
