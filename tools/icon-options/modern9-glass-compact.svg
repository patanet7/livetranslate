<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg9" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="50%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="glass9" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0.12"/>
    </linearGradient>
    <filter id="shadow9" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="20" flood-color="#4338ca" flood-opacity="0.5"/>
    </filter>
  </defs>
  <rect x="32" y="32" width="448" height="448" rx="96" fill="url(#bg9)" filter="url(#shadow9)"/>
  <!-- Glass panel -->
  <rect x="96" y="144" width="320" height="224" rx="32" fill="url(#glass9)"/>

  <!-- Audio bars (left column) -->
  <g fill="#fff">
    <rect x="128" y="216" width="12" height="80" rx="6" opacity="0.9"/>
    <rect x="152" y="184" width="12" height="144" rx="6" opacity="0.85"/>
    <rect x="176" y="200" width="12" height="112" rx="6" opacity="0.8"/>
  </g>

  <!-- Center divider with arrow -->
  <line x1="256" y1="176" x2="256" y2="336" stroke="#fff" stroke-width="3" opacity="0.3"/>
  <path d="M244 250 L268 256 L244 262" fill="#fff" opacity="0.7"/>

  <!-- Multi-script text blocks (right column) -->
  <g fill="#fff">
    <!-- Top: Latin-style (horizontal bars) -->
    <rect x="292" y="184" width="80" height="14" rx="7" opacity="0.95"/>
    <rect x="292" y="206" width="56" height="14" rx="7" opacity="0.7"/>

    <!-- Middle: CJK-style (square blocks) -->
    <rect x="292" y="240" width="20" height="20" rx="4" opacity="0.9"/>
    <rect x="320" y="240" width="20" height="20" rx="4" opacity="0.85"/>
    <rect x="348" y="240" width="20" height="20" rx="4" opacity="0.7"/>

    <!-- Bottom: Script with marks (dots suggesting Arabic/Hebrew/etc) -->
    <rect x="292" y="280" width="72" height="12" rx="6" opacity="0.6"/>
    <circle cx="300" cy="300" r="5" opacity="0.5"/>
    <circle cx="320" cy="300" r="5" opacity="0.45"/>
    <circle cx="340" cy="300" r="5" opacity="0.4"/>
  </g>
</svg>
