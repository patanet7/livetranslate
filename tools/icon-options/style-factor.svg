<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgF" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <!-- Dark slate squircle -->
  <rect x="32" y="32" width="448" height="448" rx="100" fill="url(#bgF)"/>

  <!-- Ultra-minimal: three geometric shapes representing transformation -->
  <!-- Input: circle (audio/sound - universal) -->
  <circle cx="140" cy="256" r="48" fill="none" stroke="#38bdf8" stroke-width="10"/>

  <!-- Transform: equals/arrow (clean, technical) -->
  <line x1="220" y1="240" x2="292" y2="240" stroke="#94a3b8" stroke-width="8" stroke-linecap="round"/>
  <line x1="220" y1="272" x2="292" y2="272" stroke="#94a3b8" stroke-width="8" stroke-linecap="round"/>
  <path d="M280 224 L304 256 L280 288" stroke="#94a3b8" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Output: square (text/structure) -->
  <rect x="340" y="208" width="96" height="96" rx="16" fill="none" stroke="#a78bfa" stroke-width="10"/>

  <!-- Small accent dot -->
  <circle cx="388" cy="256" r="12" fill="#a78bfa" opacity="0.6"/>
</svg>
