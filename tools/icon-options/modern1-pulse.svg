<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="glow1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.25"/>
      <stop offset="50%" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow1" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#4338ca" flood-opacity="0.4"/>
    </filter>
  </defs>
  <!-- Squircle background -->
  <rect x="32" y="32" width="448" height="448" rx="96" fill="url(#bg1)" filter="url(#shadow1)"/>
  <rect x="32" y="32" width="448" height="224" rx="96" fill="url(#glow1)"/>
  <!-- Audio waveform - simple and bold -->
  <g stroke="#fff" stroke-width="32" stroke-linecap="round" fill="none">
    <line x1="156" y1="200" x2="156" y2="312"/>
    <line x1="216" y1="144" x2="216" y2="368"/>
    <line x1="276" y1="176" x2="276" y2="336"/>
    <line x1="336" y1="128" x2="336" y2="384"/>
    <line x1="396" y1="192" x2="396" y2="320"/>
  </g>
</svg>
