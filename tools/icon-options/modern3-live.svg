<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f43f5e"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="glow3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.25"/>
      <stop offset="50%" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow3" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#be123c" flood-opacity="0.4"/>
    </filter>
  </defs>
  <rect x="32" y="32" width="448" height="448" rx="96" fill="url(#bg3)" filter="url(#shadow3)"/>
  <rect x="32" y="32" width="448" height="224" rx="96" fill="url(#glow3)"/>
  <!-- Live indicator dot with broadcast rings -->
  <circle cx="256" cy="256" r="48" fill="#fff"/>
  <circle cx="256" cy="256" r="96" stroke="#fff" stroke-width="16" fill="none" opacity="0.6"/>
  <circle cx="256" cy="256" r="152" stroke="#fff" stroke-width="12" fill="none" opacity="0.35"/>
</svg>
