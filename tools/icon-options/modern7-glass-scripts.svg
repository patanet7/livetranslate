<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg7" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="50%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="glass7" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0.1"/>
    </linearGradient>
    <filter id="shadow7" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="20" flood-color="#4338ca" flood-opacity="0.5"/>
    </filter>
  </defs>
  <rect x="32" y="32" width="448" height="448" rx="96" fill="url(#bg7)" filter="url(#shadow7)"/>
  <!-- Glass panel -->
  <rect x="80" y="120" width="352" height="272" rx="32" fill="url(#glass7)"/>

  <!-- Audio wave icon (left) -->
  <g fill="#fff" opacity="0.9">
    <rect x="112" y="224" width="8" height="64" rx="4"/>
    <rect x="128" y="200" width="8" height="112" rx="4"/>
    <rect x="144" y="216" width="8" height="80" rx="4"/>
  </g>

  <!-- Arrow flow -->
  <path d="M176 256 L208 256" stroke="#fff" stroke-width="6" stroke-linecap="round" opacity="0.6"/>
  <path d="M204 248 L216 256 L204 264" stroke="#fff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.6"/>

  <!-- English text (middle) -->
  <text x="256" y="220" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="600" fill="#fff" text-anchor="middle" opacity="0.95">Hello</text>

  <!-- Arrow flow -->
  <path d="M296 256 L328 256" stroke="#fff" stroke-width="6" stroke-linecap="round" opacity="0.6"/>
  <path d="M324 248 L336 256 L324 264" stroke="#fff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.6"/>

  <!-- Multi-script outputs (right side, stacked) -->
  <text x="384" y="212" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="500" fill="#fff" text-anchor="middle" opacity="0.9">你好</text>
  <text x="384" y="252" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="500" fill="#fff" text-anchor="middle" opacity="0.7">こんにちは</text>
  <text x="384" y="288" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="500" fill="#fff" text-anchor="middle" opacity="0.5">مرحبا</text>
</svg>
