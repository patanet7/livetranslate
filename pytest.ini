[pytest]
testpaths =
    modules/orchestration-service/tests
    modules/transcription-service/tests
    modules/translation-service/tests
    modules/shared/tests

python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

markers =
    unit: marks tests as unit tests
    integration: marks tests as integration tests
    e2e: marks tests as end-to-end tests
    browser: marks tests requiring browser (Playwright)
    slow: marks tests as slow (deselect with '-m "not slow"')
    stress: marks 60+ minute stress tests
    accuracy: marks accuracy regression baselines (loads large models)
    benchmark: marks performance benchmarks
    performance: marks performance-related tests
    gpu: requires GPU (skip if not available)
    gpu_required: requires GPU (alias)
    npu: requires Intel NPU (skip if not available)
    behavioral: marks tests as behavioral tests (no mocks)
    audio_pipeline: marks audio pipeline tests (auto-applied by conftest)
    error: marks error-path tests (auto-applied by conftest)
    format: marks format/serialization tests (auto-applied by conftest)
    llm: marks tests requiring LLM backend

addopts =
    -v
    --strict-markers
    --tb=short
    -ra
    --showlocals
    --timeout=300

# Async mode
asyncio_mode = auto

# Allow imports from src directories
pythonpath = .

# Filter warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
