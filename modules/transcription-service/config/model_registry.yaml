version: 1

backends:
  whisper:
    module: backends.whisper
    class: WhisperBackend
  mlx:
    module: backends.mlx_whisper
    class: MLXWhisperBackend
  vllm:
    module: backends.vllm_whisper
    class: VLLMWhisperBackend

vram_budget_mb: 10000

# NOTE: stride_s MUST equal chunk_duration_s - overlap_s
# Changing chunk_duration_s or overlap_s requires updating stride_s accordingly
language_routing:
  en:
    backend: whisper
    model: large-v3-turbo
    compute_type: float16
    chunk_duration_s: 5.0
    stride_s: 4.0
    overlap_s: 1.0
    vad_threshold: 0.5
    beam_size: 1
    prebuffer_s: 0.3
    batch_profile: realtime
  zh:
    backend: whisper
    model: large-v3-turbo
    compute_type: float16
    chunk_duration_s: 5.0
    stride_s: 4.0
    overlap_s: 1.0
    vad_threshold: 0.45
    beam_size: 1
    prebuffer_s: 0.3
    batch_profile: realtime
  ja:
    backend: whisper
    model: large-v3-turbo
    compute_type: float16
    chunk_duration_s: 5.0
    stride_s: 4.0
    overlap_s: 1.0
    vad_threshold: 0.45
    beam_size: 1
    prebuffer_s: 0.3
    batch_profile: realtime
  "*":
    backend: whisper
    model: large-v3-turbo
    compute_type: float16
    chunk_duration_s: 5.0
    stride_s: 4.0
    overlap_s: 1.0
    vad_threshold: 0.5
    beam_size: 1
    prebuffer_s: 0.3
    batch_profile: realtime
