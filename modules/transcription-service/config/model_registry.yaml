version: 1

backends:
  whisper:
    module: backends.whisper
    class: WhisperBackend

vram_budget_mb: 10000

language_routing:
  en:
    backend: whisper
    model: large-v3-turbo
    compute_type: float16
    chunk_duration_s: 5.0
    stride_s: 4.5
    overlap_s: 0.5
    vad_threshold: 0.5
    beam_size: 1
    prebuffer_s: 0.3
    batch_profile: realtime
  "*":
    backend: whisper
    model: large-v3-turbo
    compute_type: float16
    chunk_duration_s: 5.0
    stride_s: 4.5
    overlap_s: 0.5
    vad_threshold: 0.5
    beam_size: 1
    prebuffer_s: 0.3
    batch_profile: realtime
