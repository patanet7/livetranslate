version: 1

backends:
  mlx:
    module: backends.mlx_whisper
    class: MLXWhisperBackend

vram_budget_mb: 16000

# Local dev (Apple Silicon / CPU) — longer prebuffer than GPU config.
# prebuffer_s=3.0 ensures first inference gets enough audio for accurate
# transcription. GPU config uses 0.3s because inference is <0.5s.
# NOTE: stride_s MUST equal chunk_duration_s - overlap_s
# Optimal configs from benchmark sweep (2026-03-15).
# Local (Apple Silicon) uses same optimal configs as GPU but with
# longer prebuffer (1.0s) since MLX inference is slower.
language_routing:
  en:
    backend: mlx
    model: large-v3-turbo
    compute_type: float16
    chunk_duration_s: 6.5
    stride_s: 6.0
    overlap_s: 0.5
    vad_threshold: 0.5
    beam_size: 1
    prebuffer_s: 1.0
    batch_profile: realtime
  zh:
    backend: mlx
    model: large-v3-turbo
    compute_type: float16
    chunk_duration_s: 7.5
    stride_s: 6.0
    overlap_s: 1.5
    vad_threshold: 0.45
    beam_size: 1
    prebuffer_s: 1.0
    batch_profile: realtime
  ja:
    backend: mlx
    model: large-v3-turbo
    compute_type: float16
    chunk_duration_s: 7.5
    stride_s: 6.0
    overlap_s: 1.5
    vad_threshold: 0.45
    beam_size: 1
    prebuffer_s: 1.0
    batch_profile: realtime
  "*":
    backend: mlx
    model: large-v3-turbo
    compute_type: float16
    chunk_duration_s: 6.5
    stride_s: 6.0
    overlap_s: 0.5
    vad_threshold: 0.5
    beam_size: 1
    prebuffer_s: 1.0
    batch_profile: realtime
